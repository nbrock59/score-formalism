name: spine-check

# Mirror-tailored validation:
#   dl-conformance  - OWL DL conformance: core ⊕ each impl layer under HermiT
#   lean-build      - the Lean spine (formal/) compiles under lake (mathlib cache)
#
# The wider polaris CI additionally runs structural vault-consistency, glossary
# traceability, and staleness-pattern checks that require the polaris working tree
# (concept vault, outreach drafts, theoretical notes). Those cannot run against a
# formalism-only mirror; they gate the private polaris repo instead.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dl-conformance:
    name: OWL DL conformance (HermiT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: install reasoner deps
        run: pip install owlready2
      # score_reason.py auto-discovers every score-<impl>.owl in formal/ and reasons
      # core ⊕ <impl> for each; it exits nonzero if ANY peer is inconsistent or has an
      # unsatisfiable class. So a conformance regression in any peer layer fails this job.
      - name: HermiT — core consistent; core ⊕ every impl layer conformant
        run: python scripts/score_reason.py

  lean-build:
    name: Lean spine builds (lake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          # the lakefile lives in formal/, not the repo root
          lake-package-directory: "formal"
          # build only (no test/lint drivers configured); mathlib cache is fetched
          # automatically so CI does not rebuild Mathlib from source
          test: false
          lint: false
