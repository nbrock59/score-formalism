\* Homogeneous ring (identical machines): self-stabilization FAILS.
\* Same N, K as Ring.cfg. TLC reports a reachable illegitimate DEADLOCK -- the
\* all-equal configuration s = (0:>0 @@ 1:>0 @@ 2:>0): every machine's left
\* neighbour equals it, so zero machines are privileged, no move is enabled,
\* and it is illegitimate (legitimacy needs exactly one privilege). The ring
\* cannot escape it, so ConvergesHom is likewise violated. This is the
\* machine-checked form of Dijkstra's "identical machines cannot
\* self-stabilize" finding.
SPECIFICATION SpecHom

CONSTANTS
    N = 2
    K = 3

INVARIANT TypeOK
PROPERTY  ConvergesHom
