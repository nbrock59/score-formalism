\* (1) Stratification invariant HOLDS: a live (Maturity) closure requires BOTH
\* layers stable -- the formal (higher stratum) is live only on a stable
\* informal (lower stratum). "Higher strata only on stable lower strata."
\* Run with -deadlock (Death-with-formal-dissolution is a legitimate terminal-ish
\* state whose only move is DeathFreshStart; the invariant is what matters).
SPECIFICATION Spec

CONSTANTS
    L = 3
    Theta = 2

INVARIANT TypeOK
INVARIANT Stratification
