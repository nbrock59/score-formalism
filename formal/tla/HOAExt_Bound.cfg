\* (3) Bounded / conditional extension: MaintInv is VIOLATED.
\* Same start as (1) but moves are unconstrained. The residue extension is not
\* permanent: eroding the residue (or disengaging feedback) drops ExtWeight
\* below Formation and dissolves the HOA. TLC returns a counterexample trace
\* ending in ~HOAExistsExt (e.g. residue 3->2 at zero substrate/endowment).
SPECIFICATION SpecBound

CONSTANTS
    L = 4
    Formation = 3
    Dissolution = 2

INVARIANT TypeOK
INVARIANT MaintInv
