\* (3) Floor loss -- FlooredAtIrreducible is VIOLATED for the composite.
\* Composing the floorless ceiling-residue mechanism with the floored B3
\* mechanism REMOVES the B3 irreducible floor: a maintained composite HOA
\* reaches substrate = 0 (e.g. residue=2, b3=2 zero the effective dissolution),
\* where B3 alone kept substrate >= IrreducibleMin (HOAB3.tla, HOAB3_Floor.cfg
\* HOLDS). The composite inherits the WEAKER (floorless) behaviour -- a genuine
\* model-checked finding about the § 3.2 ⊕ § 3.3 join.
SPECIFICATION SpecMaint

CONSTANTS
    L = 4
    Formation = 3
    Dissolution = 2
    IrreducibleMin = 1

INVARIANT TypeOK
INVARIANT FlooredAtIrreducible
