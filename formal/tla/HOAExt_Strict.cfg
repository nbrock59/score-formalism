\* (2) Strict extension (the headline §HM11 result): NeedsFullBasin is VIOLATED.
\* Same maintenance spec as (1), but the invariant claims a maintained HOA
\* always needs the formal basin (HOAExistsExt => substrate >= Dissolution).
\* TLC returns a counterexample: a maintained HOA with substrate < Dissolution,
\* held up by ceiling residue below the formal dissolution floor. ExtendedBasin
\* is strictly weaker than Basin (Lean: basin_implies_extendedBasin).
SPECIFICATION SpecMaint

CONSTANTS
    L = 4
    Formation = 3
    Dissolution = 2

INVARIANT TypeOK
INVARIANT NeedsFullBasin
