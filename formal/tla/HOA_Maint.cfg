\* (1) Within-basin maintenance (§HM8) HOLDS.
\* From an existing HOA in basin, every basin+feedback-preserving move keeps
\* HOAExists -> the maintenance theorem, model-checked for the discretized
\* additive combine. Run with -deadlock (edge states may have no in-basin
\* successor; the invariant is what matters and is checked on every state).
SPECIFICATION SpecMaint

CONSTANTS
    L = 4
    Formation = 3
    Dissolution = 2

INVARIANT TypeOK
INVARIANT MaintInv
