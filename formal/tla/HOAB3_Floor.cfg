\* (3) The irreducible floor (the § 3.3 "not infinite" wrinkle) HOLDS.
\* The distinguishing feature of B3 substrate vs ceiling residue: no matter how
\* much formal B3 substrate, a maintained HOA ALWAYS has substrate >=
\* IrreducibleMin. The extension floors at IrreducibleMin > 0
\* (bounded_below_by_irreducible) -- unlike ceiling residue, whose analogous
\* invariant is VIOLATED at substrate=0 (HOAExt.tla, HOAExt_Strict.cfg).
\* "A formal structure rejected by all informal networks is paper without power."
\* Run with -deadlock.
SPECIFICATION SpecMaint

CONSTANTS
    L = 4
    Formation = 3
    Dissolution = 2
    IrreducibleMin = 1

INVARIANT TypeOK
INVARIANT FlooredAtIrreducible
