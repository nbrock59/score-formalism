\* (3) Bistability / no spontaneous formation -- UnformedInv HOLDS.
\* In the hysteresis window (Dissolution <= substrate < Formation) an unformed
\* structure whose loop stays disengaged never reaches HOAExists. The same
\* substrate that maintains a formed HOA in (1) will not form one here --
\* history-dependence = the formation != dissolution asymmetry. Run with
\* -deadlock (the unformed equilibrium may have no in-window successor).
SPECIFICATION SpecBist

CONSTANTS
    L = 4
    Formation = 3
    Dissolution = 2

INVARIANT TypeOK
INVARIANT UnformedInv
