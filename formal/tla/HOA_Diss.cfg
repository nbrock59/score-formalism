\* (2) Dissolution outside the basin -- MaintInv is VIOLATED (counterexample).
\* Same start as (1) but moves are unconstrained: leaving the basin (substrate
\* < Dissolution) or disengaging the loop drops Weight below Formation, so the
\* HOA dissolves. TLC returns a counterexample trace ending in ~HOAExists.
SPECIFICATION SpecDiss

CONSTANTS
    L = 4
    Formation = 3
    Dissolution = 2

INVARIANT TypeOK
INVARIANT MaintInv
