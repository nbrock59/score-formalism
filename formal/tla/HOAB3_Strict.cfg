\* (2) Strict extension: NeedsFullBasin is VIOLATED.
\* Like ceiling residue, the formal B3 substrate extends maintenance below the
\* formal dissolution floor. TLC returns a counterexample: a maintained HOA at
\* substrate < Dissolution (e.g. substrate=1, held up by b3). FormalExtendedBasin
\* is strictly weaker than Basin.
SPECIFICATION SpecMaint

CONSTANTS
    L = 4
    Formation = 3
    Dissolution = 2
    IrreducibleMin = 1

INVARIANT TypeOK
INVARIANT NeedsFullBasin
